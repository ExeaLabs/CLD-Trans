defaults:
  - base
  - _self_

mode: stage2
data:
  synthetic: false
  dataset: ptbxl
  path: /scratch/cld-trans/datasets/ptb-xl
  sample_rate: 500.0
  num_steps: 5000
  window_seconds: 10.0
model:
  num_channels: 12
  num_classes: 5
  tau_max: 0.08
train:
  device: cuda
  precision: bf16
  batch_size: 192
  num_workers: 12
  prefetch_factor: 4
  persistent_workers: true
  pin_memory: true
  lr: 1.0e-4
  max_steps: null
  epochs: 60
  warmup_steps: 1000
  log_interval: 50
  task_type: multi_label
  ema:
    enabled: true
    decay: 0.999
