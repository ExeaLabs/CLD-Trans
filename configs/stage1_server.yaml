defaults:
  - base
  - _self_

mode: stage1
data:
  synthetic: false
  pretrain_corpora: [eegmmidb, mimic-iv-ecg]
  sample_rate: 160.0
  num_steps: 7680
model:
  num_channels: 64
  num_classes: 2
  codebook_size: 512
  motif_dim: 128
  hidden_dim: 128
  tau_max: 2.0
  top_k: 4
  ode_solver: rk4
train:
  device: cuda
  batch_size: 70
  num_workers: 16
  prefetch_factor: 4
  compile: false
  compile_mode: default
  lr: 3.0e-4
  epochs: 100
  max_steps: null
  val_split: 0.1
  monitor: val_loss
  best_checkpoint_name: stage1_server_best.pt
  precision: bf16
  early_stopping:
    enabled: true
    mode: min
    patience: 5
    min_delta: 1.0e-4
