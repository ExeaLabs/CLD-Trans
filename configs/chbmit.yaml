defaults:
  - base
  - _self_

mode: stage2
data:
  synthetic: false
  dataset: chbmit
  path: /scratch/cld-trans/datasets/chb-mit
  sample_rate: 256.0
  num_steps: 7680
  window_seconds: 30.0
model:
  num_channels: 23
  num_classes: 2
  tau_max: 1.0
train:
  device: cuda
  precision: bf16
  batch_size: 16
  num_workers: 12
  prefetch_factor: 4
  persistent_workers: true
  pin_memory: true
  lr: 1.0e-4
  max_steps: null
  epochs: 60
  warmup_steps: 1000
  log_interval: 50
  task_type: single_label
  focal_gamma: 2.0
  ema:
    enabled: true
    decay: 0.999
