defaults:
  - base
  - _self_

mode: stage2
data:
  synthetic: false
  dataset: sleepedf
  path: /scratch/cld-trans/datasets/sleep-edf
  sample_rate: 100.0
  window_seconds: 30.0
model:
  num_channels: 7
  num_classes: 5
  tau_max: 2.0
train:
  device: cuda
  precision: bf16
  batch_size: 32
  lr: 1.0e-4
  epochs: 60
  warmup_steps: 1000
  task_type: single_label
  ema:
    enabled: true
    decay: 0.999
