defaults:
  - base
  - _self_

mode: stage1
data:
  synthetic: false
  pretrain_corpora: [eegmmidb, mimic-iv-ecg]
  sample_rate: 160.0
  num_steps: 2048
model:
  num_channels: 64
  num_classes: 2
  codebook_size: 256
  motif_dim: 64
  hidden_dim: 64
  tau_max: 2.0
  top_k: 4
  ode_solver: dopri5
train:
  device: cuda
  batch_size: 2
  lr: 3.0e-4
  epochs: 100
  max_steps: null
  precision: bf16